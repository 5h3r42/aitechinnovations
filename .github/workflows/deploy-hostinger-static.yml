name: Deploy static site to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hostinger-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out production source
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate static export
        run: |
          npx tsc --noEmit
          npm run lint
          node --test tests/analytics-consent-loading.test.mjs tests/website-ai-pricing.test.mjs tests/accountant-ai-receptionist.test.mjs
          npm run build
          npm run check
          test -f out/index.html
          test -f out/api/chatbot.php
          test -f out/.htaccess

      - name: Configure verified SFTP access
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          HOSTINGER_SSH_KNOWN_HOSTS: ${{ secrets.HOSTINGER_SSH_KNOWN_HOSTS }}
          HOSTINGER_REMOTE_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
        run: |
          set -euo pipefail
          test -n "$HOSTINGER_HOST"
          test -n "$HOSTINGER_PORT"
          test -n "$HOSTINGER_USERNAME"
          test -n "$HOSTINGER_SSH_PRIVATE_KEY"
          test -n "$HOSTINGER_SSH_KNOWN_HOSTS"
          test -n "$HOSTINGER_REMOTE_PATH"

          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$HOSTINGER_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keygen -y -f "$HOME/.ssh/id_ed25519" > "$HOME/.ssh/id_ed25519.pub"
          ssh-keygen -lf "$HOME/.ssh/id_ed25519.pub"

          printf '%s\n' "$HOSTINGER_SSH_KNOWN_HOSTS" | tr -d '\r' > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Test SSH authentication
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
        run: |
          ssh -vv \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -p "$HOSTINGER_PORT" \
            -i "$HOME/.ssh/id_ed25519" \
            "$HOSTINGER_USERNAME@$HOSTINGER_HOST" "echo SSH_OK"

      - name: Upload static export contents over SFTP
        env:
          HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
          HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          HOSTINGER_REMOTE_PATH: ${{ secrets.HOSTINGER_REMOTE_PATH }}
        run: |
          sftp \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -b - \
            -P "$HOSTINGER_PORT" \
            -i "$HOME/.ssh/id_ed25519" \
            "$HOSTINGER_USERNAME@$HOSTINGER_HOST" <<SFTP
          cd $HOSTINGER_REMOTE_PATH
          put out/.htaccess .
          put -r out/* .
          SFTP
